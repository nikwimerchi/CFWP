openapi: 3.0.0
info:
  title: "Children Welfare Portal API"
  version: "1.0.0"
  description: "Comprehensive API Documentation for the Supabase-backed health monitoring system."

servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- Shared Schemas ---
    address:
      type: object
      properties:
        province: { type: string }
        district: { type: string }
        sector: { type: string }
        cell: { type: string }
        village: { type: string }

    # --- Auth Schemas ---
    loginData:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    signupData:
      type: object
      required: [names, email, password, address, role]
      properties:
        names: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password }
        role: { type: string, enum: [parent, advisor, admin] }
        address: { $ref: '#/components/schemas/address' }

    # --- Business Logic Schemas ---
    child:
      type: object
      required: [firstName, lastName, dateOfBirth, parentId]
      properties:
        id: { type: string, format: uuid }
        firstName: { type: string }
        lastName: { type: string }
        dateOfBirth: { type: string, format: date }
        parentId: { type: string, format: uuid }
        address: { $ref: '#/components/schemas/address' }

    healthData:
      type: object
      required: [childId, weight, height, width]
      properties:
        childId: { type: string, format: uuid }
        weight: { type: number, example: 12.5 }
        height: { type: number, example: 85.0 }
        width: { type: number, description: "MUAC measurement", example: 13.5 }

tags:
  - name: Authentication
  - name: Child Management
  - name: Health Records
  - name: Advisors
  - name: Measurements

paths:
  # --- AUTH ---
  /auth/signup:
    post:
      tags: [Authentication]
      summary: Register a new account
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/signupData' }
      responses:
        201: { description: "User created" }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate user
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/loginData' }
      responses:
        200: { description: "Token returned" }

  # --- CHILDREN ---
  /child:
    get:
      tags: [Child Management]
      summary: Fetch children list
      security: [{ bearerAuth: [] }]
      responses:
        200: { description: "Success" }
    post:
      tags: [Child Management]
      summary: Register a child
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/child' }
      responses:
        201: { description: "Created" }

  /child/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Child Management]
      summary: Get child by UUID
    delete:
      tags: [Child Management]
      summary: Remove child record
      security: [{ bearerAuth: [] }]

  # --- HEALTH DATA ---
  /healthData:
    post:
      tags: [Health Records]
      summary: Add monthly growth measurements
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/healthData' }
      responses:
        201: { description: "Data saved and condition calculated" }

  /healthData/{childId}:
    get:
      tags: [Health Records]
      summary: Get growth history for a child
      parameters:
        - name: childId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200: { description: "History retrieved" }

  # --- ADVISORS ---
  /advisors/jurisdiction:
    get:
      tags: [Advisors]
      summary: Find advisors by location
      security: [{ bearerAuth: [] }]
      parameters:
        - name: district
          in: query
          schema: { type: string }
      responses:
        200: { description: "OK" }

  # --- MEASUREMENTS ---
  /measurements:
    get:
      tags: [Measurements]
      summary: Get WHO health standards
    post:
      tags: [Measurements]
      summary: Update standards (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        201: { description: "Standards updated" }